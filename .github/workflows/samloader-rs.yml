name: Build samloader-rs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get_short_commit_hash:
    runs-on: ubuntu-latest
    outputs:
      hash: ${{ steps.short_commit_hash.outputs.short }}
    steps:
      - name: Prepare commit hash
        id: commit_hash
        run: |
          git clone https://github.com/topjohnwu/samloader-rs cache --depth 1
          cd cache
          echo "hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          cd ..
          rm -rf cache
      - name: Get short commit hash
        id: short_commit_hash
        uses: prompt/actions-commit-hash@v3
        with:
          commit: ${{ steps.commit_hash.outputs.hash }}
  build:
    needs: get_short_commit_hash
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
          - platform: macos-26-intel
            target: x86_64-apple-darwin
            name: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: Linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: topjohnwu/samloader-rs
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-cache-${{ matrix.target }}"
          cache-on-failure: true

      - name: Build app
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [[ -f target/${{ matrix.target }}/release/samloader.exe ]]; then
            cp target/${{ matrix.target }}/release/samloader.exe dist/
            cd dist
            7z a samloader-${{ needs.get_short_commit_hash.outputs.hash }}-${{ matrix.target }}.zip samloader.exe
            rm samloader.exe
          else
            cp target/${{ matrix.target }}/release/samloader dist/
            cd dist
            7z a samloader-${{ needs.get_short_commit_hash.outputs.hash }}-${{ matrix.target }}.zip samloader
            rm samloader
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: samloader-rs-${{ needs.get_short_commit_hash.outputs.hash }}-${{ matrix.name }}
          path: dist/*

  release:
    runs-on: ubuntu-latest
    needs:
      - get_short_commit_hash
      - build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: samloader-rs-${{ needs.get_short_commit_hash.outputs.hash }}
          name: Binary build for samloader-rs (${{ needs.get_short_commit_hash.outputs.hash }})
          body: |
            This release contains the alpha binary of [samloader-rs](https://github.com/topjohnwu/samloader-rs).
          files: dist/**/*
          fail_on_unmatched_files: true
