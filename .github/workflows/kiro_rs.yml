name: Build Kiro.rs

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
          - platform: macos-26-intel
            target: x86_64-apple-darwin
            name: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: Linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          repository: hank9999/kiro.rs
          submodules: recursive
          ref: ${{ inputs.version }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest
          check-latest: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install admin-ui Dependencies
        working-directory: admin-ui
        run: pnpm install

      - name: Build admin-ui
        working-directory: admin-ui
        run: pnpm build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-cache-${{ matrix.target }}"
          cache-on-failure: true

      - name: Build app
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [[ -f target/${{ matrix.target }}/release/kiro-rs.exe ]]; then
            cp target/${{ matrix.target }}/release/kiro-rs.exe dist/
            cd dist
            7z a kiro-rs-${{ inputs.version }}-${{ matrix.target }}.zip kiro-rs.exe
            rm kiro-rs.exe
          else
            cp target/${{ matrix.target }}/release/kiro-rs dist/
            cd dist
            7z a kiro-rs-${{ inputs.version }}-${{ matrix.target }}.zip kiro-rs
            rm kiro-rs
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: kiro-rs-${{ inputs.version }}-${{ matrix.name }}
          path: dist/*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: kiro-rs-${{ inputs.version }}
          name: Binary build for Kiro.rs (${{ inputs.version }})
          body: |
            This release contains the binary of [Kiro.rs](https://github.com/hank9999/kiro.rs).
          files: dist/**/*
          fail_on_unmatched_files: true
