name: Build hydroxide

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            goos: darwin
            goarch: arm64
            name: macOS-arm64
            zip_name: macos-arm64
            ext: ""
          - platform: macos-26-intel
            goos: darwin
            goarch: amd64
            name: macOS-x64
            zip_name: macos-x64
            ext: ""
          - platform: windows-latest
            goos: windows
            goarch: amd64
            name: Windows-x64
            zip_name: windows-x64
            ext: .exe
          - platform: ubuntu-latest
            goos: linux
            goarch: amd64
            name: Linux-x64
            zip_name: linux-x64
            ext: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          repository: emersion/hydroxide
          submodules: recursive
          ref: ${{ inputs.version }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Build
        shell: bash
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p build
          go build -trimpath -ldflags="-s -w" ./cmd/hydroxide

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          7z a dist/hydroxide-${{ inputs.version }}-${{ matrix.zip_name }}.zip hydroxide${{ matrix.ext }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: hydroxide-${{ inputs.version }}-${{ matrix.name }}
          path: dist/*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: hydroxide-${{ inputs.version }}
          name: Binary build for hydroxide (${{ inputs.version }})
          body: |
            This release contains the binary of [hydroxide](https://github.com/emersion/hydroxide).
          files: dist/**/*
          fail_on_unmatched_files: true
